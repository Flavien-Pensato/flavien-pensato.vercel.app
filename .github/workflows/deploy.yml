on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare standalone output
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ vars.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          rsync -avz --delete \
            .next/standalone/ \
            ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:/var/www/flavienpensato/public/

      - name: Restart app on server (optionnel)
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} "
            cd /var/www/flavienpensato/public && \
            (pm2 restart flavienpensato 2>/dev/null || true)
          "
